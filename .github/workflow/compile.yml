name: NodeJava Auto-Build
on: [push] # The robot wakes up every time you commit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile NodeHP
        run: |
          javac NodeJava/NodeHP.java
          echo "Successfully compiled NodeHP to bytecode!"
          
